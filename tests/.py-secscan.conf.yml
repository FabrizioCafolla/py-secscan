version: "1"

options:
  debug: false
  venv_dirpath: "tests/.venv"
  env:
    # A: "$(echo 'C')"
    B: "2"
  security:
    enabled: true
    # disable_venv_check: true
    # additional_forbbiden_commands: ["echo"]

packages:
  - command_name: "echo"
    command_args: ["ciao", "${A}", "${B}"]
    on_error_continue: false
  - command_name: "ruff"
    command_args: ["check", "--fix"]
    on_error_continue: true
  - install:
      extras: ["toml"]
    command_name: "bandit"
    command_args: ["-r", "."]
    enabled: false
  - install:
      package_name: "cyclonedx-bom"
    command_name: "cyclonedx-py"
    command_args: ["environment", "--outfile", "test.json"]
